name: Seveth demo (Label Triggered Deployment)

on:
  pull_request:
    types: [labeled] # The event that starts the engine

jobs:
  deploy-job:
    # Logic: Only execute if the label added is exactly "stage-deploy"
    if: github.event.label.name == 'stage-deploy'
    runs-on: ubuntu-latest
    
    # FIX: Explicitly granting write access to the GITHUB_TOKEN
    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Simulated Deployment
        run: |
          echo "🚀 Deploying PR #${{ github.event.pull_request.number }} to Staging..."
          echo "Branch: ${{ github.head_ref }}"
          sleep 5
          echo "Deployment successful for Lucknow Lab Environment! ✅"

      - name: Print imp context
        run: |
          echo "🚀 DEPLOYMENT STARTING"
          echo "------------------------------------------------"
          echo "Target PR: #${{ github.event.pull_request.number }}"
          echo "PR Title: ${{ github.event.pull_request.title }}"
          echo "Triggered By: @${{ github.actor }}"
          echo "Label Applied: ${{ github.event.label.name }}"
          echo "Source Branch: ${{ github.head_ref }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "------------------------------------------------"
          echo "Deploying to Lucknow Lab Environment..."
          sleep 5
          echo "Deployment successful! ✅"

      - name: Add Feedback Comment
        uses: actions/github-script@v7
        with:
          script: |
            // This script will now succeed because of the permissions block above
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `🚀 **Deployment Dashboard Update** \n\n I detected the \`stage-deploy\` label. This branch has been successfully pushed to the staging server. \n\n **Triggered by:** @${context.actor}`
            })
