name: Second demo (GH-200 Matrix Dashboard (Unique Identity))

on:
  workflow_dispatch:


jobs:
  # JOB 1: Parallel Execution with Unique Naming
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        values: ["10 20", "40 60"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Execute Logic with Unique Filename
        run: |
          mkdir -p output
          # Define a unique filename using the matrix strategy index
          # This ensures we don't have 4 files all named "result.txt"
          FILENAME="result-job-${{ strategy.job-index }}.txt"
          
          echo "Processing ${{ matrix.values }} on Node ${{ matrix.node-version }}..."
          node src/math.js ${{ matrix.values }} > output/$FILENAME
          
          echo "Generated: $FILENAME"

      - name: Upload Unique Artifacts
        uses: actions/upload-artifact@v4
        with:
          # Naming the container uniquely
          name: runner-data-${{ strategy.job-index }}
          path: output/
          retention-days: 1

  # JOB 2: Dashboard Generation
  summary:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Download all Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results

      - name: 📊 Generate Clean Dashboard
        run: |
          echo "## 🚀 GH-200 Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "| Unique Source File | Math Result | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY

          # We look specifically for the result-job-*.txt files we created
          find all-results -name "result-job-*.txt" | while read -r file; do
            FILE_NAME=$(basename "$file")
            RESULT=$(cat "$file")
            
            # This will now display 'result-job-0.txt', 'result-job-1.txt', etc.
            echo "| \`$FILE_NAME\` | **$RESULT** | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          done
