name: simple demo part 2

on:
  workflow_dispatch:

jobs:
  greeting_job:
    runs-on: ubuntu-latest
    steps:
      - name: "Say Hello"
        run: echo "Hi Everyone its Tuesday!"

  # This job runs in PARALLEL with greeting_job
  parallel_job:
    runs-on: ubuntu-latest
    steps:
      - name: "Run Parallel Task"
        run: echo "I am running at the same time as the greeting job!"
